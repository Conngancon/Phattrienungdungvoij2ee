<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout"
      th:with="pageTitle='Login - Course Registration'">
<div th:fragment="main-content">
    <div class="auth-container">
        <div class="card auth-card fade-in">
            <div class="auth-header">
                <i class="fas fa-graduation-cap fa-3x"></i>
                <h3 class="mt-3">Welcome back</h3>
                <p class="mb-0 text-white-75">Sign in to access your courses and progress dashboard.</p>
            </div>
            <div class="auth-body">
                <div class="alert alert-danger" th:if="${param.error}">
                    Invalid username or password!
                </div>
                <div class="alert alert-success" th:if="${param.registered}">
                    Registration successful! Please login.
                </div>
                <div class="alert alert-info" th:if="${param.logout}">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-1"></i>Login
                    </button>
                </form>

                <div class="text-center mb-3">
                    <span class="text-muted">or</span>
                </div>

                <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 mb-3">
                    <i class="fab fa-google me-2"></i>Login with Google
                </a>

                <div class="text-center">
                    <span class="text-muted">Don't have an account? </span>
                    <a th:href="@{/register}">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
