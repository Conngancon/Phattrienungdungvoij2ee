<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout"
      th:with="pageTitle='Register - Course Registration'">
<div th:fragment="main-content">
    <div class="auth-container">
        <div class="card auth-card fade-in">
            <div class="auth-header">
                <i class="fas fa-user-plus fa-3x"></i>
                <h3 class="mt-3">Create your account</h3>
                <p class="mb-0 text-white-75">Join the platform and start enrolling in courses today.</p>
            </div>
            <div class="auth-body">
                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                <form th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-user-plus me-1"></i>Register
                    </button>
                </form>

                <div class="text-center">
                    <span class="text-muted">Already have an account? </span>
                    <a th:href="@{/login}">Login here</a>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
