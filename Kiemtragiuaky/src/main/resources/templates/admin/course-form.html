<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout"
      th:with="pageTitle=${course.id != null ? 'Edit Course' : 'Create New Course'}">
<div th:fragment="main-content">
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white border-0">
                        <h3 class="mb-0">
                            <i class="fas fa-book me-2"></i>
                            <span th:text="${course.id != null ? 'Edit Course' : 'Create New Course'}"></span>
                        </h3>
                        <p class="text-muted mb-0">Use this form to add new content or update an existing course.</p>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/courses/save}" method="post" enctype="multipart/form-data" th:object="${course}">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{image}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Course Name</label>
                                <input type="text" class="form-control" th:field="*{name}" required placeholder="Enter course name">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Credits</label>
                                    <input type="number" class="form-control" th:field="*{credits}" required min="1" placeholder="Number of credits">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Lecturer</label>
                                    <input type="text" class="form-control" th:field="*{lecturer}" required placeholder="Lecturer name">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <select class="form-select" th:field="*{category.id}">
                                    <option value="">-- Select Category --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Course Image</label>
                                <input type="file" class="form-control" name="imageFile" accept="image/*">
                                <div th:if="${course.image != null}" class="mt-2">
                                    <img th:src="${course.image}" class="img-fluid rounded" style="max-height: 130px;" alt="Current image">
                                    <small class="text-muted d-block">Current image (leave empty to keep)</small>
                                </div>
                            </div>

                            <div class="d-flex flex-column flex-md-row gap-2 mt-4">
                                <button type="submit" class="btn btn-add w-100">
                                    <i class="fas fa-save me-1"></i>Save Course
                                </button>
                                <a th:href="@{/admin/courses}" class="btn btn-outline-secondary w-100">
                                    <i class="fas fa-arrow-left me-1"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</html>
