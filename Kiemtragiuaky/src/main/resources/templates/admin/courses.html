<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="layout :: layout"
      th:with="pageTitle='Admin - Manage Courses'">
<div th:fragment="main-content">
    <section class="container py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4">
            <div>
                <h2 class="mb-1"><i class="fas fa-list me-2"></i>Manage Courses</h2>
                <p class="text-muted mb-0">Create, edit, and remove courses that students can enroll in.</p>
            </div>
            <a th:href="@{/admin/courses/create}" class="btn btn-add mt-3 mt-md-0">
                <i class="fas fa-plus me-1"></i>Add New Course
            </a>
        </div>

        <div class="table-responsive shadow-sm rounded">
            <table class="table table-striped table-hover bg-white mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Credits</th>
                        <th>Lecturer</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course, stat : ${courses}">
                        <td th:text="${stat.index + 1}"></td>
                        <td>
                            <img th:src="${course.image != null ? course.image : 'https://via.placeholder.com/60x40?text=N/A'}"
                                 style="width:60px;height:40px;object-fit:cover;border-radius:4px;" alt="img">
                        </td>
                        <td th:text="${course.name}"></td>
                        <td th:text="${course.credits}"></td>
                        <td th:text="${course.lecturer}"></td>
                        <td th:text="${course.category != null ? course.category.name : 'N/A'}"></td>
                        <td>
                            <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this course?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
            <ul class="pagination">
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/courses(page=${i})}" th:text="${i + 1}">1</a>
                </li>
            </ul>
        </nav>
    </section>
</div>
</html>
